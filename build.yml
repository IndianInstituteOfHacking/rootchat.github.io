name: Build Signed APK (Capacitor)

# Trigger: push to main/master, or run manually from the Actions tab
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (for Gradle / Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Init npm project
        run: |
          npm init -y

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli

      - name: Prepare www/ folder from index.html
        run: |
          mkdir -p www
          cp index.html www/index.html
          # Agar koi extra JS/CSS/assets files root me hain unhe bhi www me copy kar lo
          [ -f rootchat-files.js ] && cp rootchat-files.js www/rootchat-files.js || true
          shopt -s extglob nullglob
          for f in *.css *.png *.jpg *.jpeg *.svg *.webp; do
            [ -f "$f" ] && cp "$f" www/ || true
          done

      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.rootchat.app",
            "appName": "RootChat",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Create gradle.properties signing config
        run: |
          cat >> android/gradle.properties << EOF
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Wire signing config into app/build.gradle
        run: |
          python3 - << 'PYEOF'
          import re

          path = "android/app/build.gradle"
          with open(path) as f:
              content = f.read()

          signing_block = '''
          signingConfigs {
              release {
                  storeFile file(RELEASE_STORE_FILE)
                  storePassword RELEASE_STORE_PASSWORD
                  keyAlias RELEASE_KEY_ALIAS
                  keyPassword RELEASE_KEY_PASSWORD
              }
          }
          '''

          # Insert signingConfigs block right after "android {"
          if "signingConfigs" not in content:
              content = content.replace(
                  "android {",
                  "android {\n" + signing_block,
                  1
              )

          # Point release buildType at the new signing config
          content = re.sub(
              r'(buildTypes\s*\{\s*release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release',
              content
          )

          with open(path, "w") as f:
              f.write(content)
          PYEOF

      - name: Build signed release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootchat-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
