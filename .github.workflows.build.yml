name: Build Debug APK (Capacitor)

# Trigger: push to main/master, or run manually from the Actions tab
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (for Gradle / Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Init npm project
        run: |
          npm init -y

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli

      - name: Prepare www/ folder from index.html
        run: |
          mkdir -p www
          cp index.html www/index.html
          # Agar koi extra JS/CSS/assets files root me hain unhe bhi www me copy kar lo
          [ -f rootchat-files.js ] && cp rootchat-files.js www/rootchat-files.js || true
          shopt -s extglob nullglob
          for f in *.css *.png *.jpg *.jpeg *.svg *.webp; do
            [ -f "$f" ] && cp "$f" www/ || true
          done

      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.rootchat.app",
            "appName": "RootChat",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug (unsigned) APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/debug/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootchat-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
